version: "3.9"

services:
  server:
    build: ./nurserybackend
    container_name: express-server
    ports:
      - "5000:5000"
    networks:
      - fullstack-net
    restart: unless-stopped
    env_file:
      - ./nurserybackend/.env

  client:
    build:
      context: ./nurseryFrontend   # ✔️ bas ye hi rakho
    container_name: react-client
    ports:
      - "5174:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge