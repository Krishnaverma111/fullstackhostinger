services:
  server:
    build: ./nurserybackend
    container_name: express-server
    ports:
      - "5000:5000"   # ✅ same port rakho
    networks:
      - fullstack-net
    restart: unless-stopped
    env_file:
      - ./nurserybackend/.env  

  client:
    build:
      context: ./nurseryFrontend
      args:
        - VITE_API_URL=http://localhost:5000   # ✅ ENV pass
    container_name: react-client
    ports:
      - "3000:3000"   # ✅ correct port
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge